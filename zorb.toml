[package]
name = "overlay-broadcast"
version = "0.3.1"
edition = "2026"
description = "BSV-native Zeta implementation of EP 4 046 048 B1 (overlay key-graph) and GB 2623780 B (broadcast encryption)"
license = "Open BSV License"
repository = "https://github.com/murphsicles/overlay-broadcast"

[dependencies]
secmem = { zorb = "@overlay/secmem", version = "0.1" }
bsv = { zorb = "@overlay/bsv", version = "0.1" }
ckd = { zorb = "@overlay/ckd", version = "0.1" }
cipher = { zorb = "@overlay/cipher", version = "0.1" }
overlay = { zorb = "@overlay/overlay", version = "0.1" }
broadcast = { zorb = "@overlay/broadcast", version = "0.1" }
session = { zorb = "@overlay/session", version = "0.1" }
custody = { zorb = "@overlay/custody", version = "0.1" }
kst = { zorb = "@overlay/kst", version = "0.1" }
obs = { zorb = "@overlay/obs", version = "0.1" }
api = { zorb = "@overlay/api", version = "0.1" }
res = { zorb = "@overlay/res", version = "0.1" }
