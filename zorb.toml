[package]
name = "overlay-broadcast"
version = "0.3.1"
edition = "2026"
description = "BSV-native Zeta implementation of EP 4 046 048 B1 (overlay key-graph) and GB 2623780 B (broadcast encryption)"
license = "Open BSV License"
repository = "https://github.com/murphsicles/overlay-broadcast"

[dependencies]
# Overlay workspace crates
@overlay/secmem = "0.1"
@overlay/bsv = "0.1"
@overlay/ckd = "0.1"
@overlay/cipher = "0.1"
@overlay/keygraph = "0.1"
@overlay/overlay = "0.1"
@overlay/broadcast = "0.1"
@overlay/session = "0.1"
@overlay/custody = "0.1"
@overlay/kst = "0.1"
@overlay/obs = "0.1"
@overlay/api = "0.1"
@overlay/res = "0.1"

# External dependencies (transpiled Rust crates on zorbs.io)
@std/thiserror = "2.0"
@crypto/zeroize = "1.8"
@crypto/subtle = "2.6"
@crypto/rand_core = "0.6"
@crypto/sha2 = "0.10"
@crypto/ripemd = "0.1"
@crypto/hkdf = "0.12"
@crypto/k256 = "0.13"
@crypto/aes-gcm = "0.10"
@math/num-bigint-dig = "0.1"
@log/tracing = "0.2"
